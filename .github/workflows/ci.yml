name: StreamSphere Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Lint & Test StreamSphere
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install Backend Dependencies
        run: |
          cd server
          npm ci

      - name: Run Backend Checks (Syntax/Entrypoints)
        run: |
          cd server
          npm test

      - name: Install Frontend Dependencies
        run: |
          cd client
          npm ci

      - name: Run Frontend Lint Checks
        run: |
          cd client
          npm run lint

  build-and-compile:
    name: Build & Docker Verification
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd client
          npm ci

      - name: Compile Frontend Production Build
        run: |
          cd client
          npm run build

      - name: Verify Docker Compose Build
        run: |
          docker compose build --progress=plain
