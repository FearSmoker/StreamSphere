services:
  mongo:
    image: mongo:7
    container_name: streamsphere-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - streamsphere

  redis:
    image: redis:7-alpine
    container_name: streamsphere-redis
    ports:
      - "6379:6379"
    networks:
      - streamsphere

  api:
    build:
      context: ./server
    container_name: streamsphere-api
    command: npm run start:api
    depends_on:
      - mongo
      - redis
    environment:
      NODE_ENV: development
      PORT: 4000
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB_NAME: streamsphere
      REDIS_SERVER: redis
      REDIS_PORT: 6379
      SERVER_URL: http://localhost:4000
      VIDEO_SERVER_URL: http://localhost:4001
      UPLOAD_STORAGE: local
      ENABLE_WINSTON_MONGODB: "false"
      ENABLE_WINSTON_LOGGLY: "false"
    ports:
      - "4000:4000"
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - streamsphere

  worker:
    build:
      context: ./server
    container_name: streamsphere-worker
    command: npm run start:worker
    depends_on:
      - mongo
      - redis
    environment:
      NODE_ENV: development
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB_NAME: streamsphere
      REDIS_SERVER: redis
      REDIS_PORT: 6379
      SERVER_URL: http://localhost:4000
      VIDEO_SERVER_URL: http://localhost:4001
      UPLOAD_STORAGE: local
      ENABLE_WINSTON_MONGODB: "false"
      ENABLE_WINSTON_LOGGLY: "false"
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - streamsphere

  video-server:
    build:
      context: ./server
    container_name: streamsphere-video-server
    command: npm run start:video
    environment:
      VIDEO_PORT: 4001
    ports:
      - "4001:4001"
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - streamsphere

  frontend:
    build:
      context: ./client
      args:
        REACT_APP_API_SERVER: http://localhost:4000
        REACT_APP_VIDEO_SERVER: http://localhost:4001
    container_name: streamsphere-frontend
    depends_on:
      - api
      - video-server
    ports:
      - "3000:3000"
    networks:
      - streamsphere

networks:
  streamsphere:
    driver: bridge

volumes:
  mongo-data:
